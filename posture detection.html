<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Gym Posture Coach</title>
    <!-- Tailwind CSS for modern styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- TensorFlow.js and Pose Detection Models -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>

    <style>
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #2563eb; }
        
        /* Smooth transitions */
        .transition-all { transition-property: all; transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1); transition-duration: 300ms; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen flex flex-col items-center py-8 px-4">

    <div class="max-w-6xl w-full">
        <!-- Header -->
        <header class="mb-8 text-center">
            <h1 class="text-4xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-green-400 to-blue-500 mb-2">
                AI Posture Coach
            </h1>
            <p class="text-slate-400">Real-time gym exercise tracking & posture correction</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- Video & Canvas Area (Left side) -->
            <div class="lg:col-span-2 relative bg-black rounded-2xl overflow-hidden shadow-2xl shadow-green-900/10 border border-slate-800 aspect-[4/3] flex items-center justify-center">
                <!-- Video feed. transform scale-x-[-1] mirrors the video to behave like a standard mirror -->
                <video id="video" class="absolute inset-0 w-full h-full object-contain transform scale-x-[-1]" playsinline></video>
                <!-- Canvas for drawing skeleton/angles. Must match video mirroring -->
                <canvas id="canvas" class="absolute inset-0 w-full h-full object-contain transform scale-x-[-1] pointer-events-none"></canvas>
                
                <!-- Initial Loading Screen -->
                <div id="loadingOverlay" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-950/90 z-20 backdrop-blur-sm transition-opacity duration-500">
                    <svg class="animate-spin -ml-1 mr-3 h-12 w-12 text-green-500 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <span class="text-xl font-semibold text-green-400">Downloading AI Model...</span>
                    <span class="text-sm text-slate-400 mt-2 text-center px-4">Downloading MoveNet (runs 100% locally in your browser)</span>
                </div>
                
                <!-- Prompt when camera is off -->
                <div id="cameraPrompt" class="absolute z-10 flex flex-col items-center justify-center text-slate-500">
                    <svg class="w-16 h-16 mb-2 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                    <p class="font-medium">Camera is turned off</p>
                </div>
            </div>

            <!-- Dashboard Area (Right side) -->
            <div class="space-y-6">
                
                <!-- Settings & Controls -->
                <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800 shadow-xl">
                    <h2 class="text-lg font-bold mb-4 text-slate-200 flex items-center">
                        <svg class="w-5 h-5 mr-2 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path></svg>
                        Workout Controls
                    </h2>
                    
                    <button id="cameraBtn" disabled class="w-full bg-blue-600 disabled:opacity-50 disabled:cursor-not-allowed hover:bg-blue-500 text-white p-3 rounded-xl font-semibold transition-all shadow-lg shadow-blue-600/20 mb-5">
                        Initializing...
                    </button>
                    
                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-2">Select Exercise</label>
                        <select id="exerciseSelect" class="w-full bg-slate-950 border border-slate-700 rounded-xl p-3 text-white focus:ring-2 focus:ring-green-500 focus:outline-none transition-all">
                            <option value="bicepCurl">Bicep Curls</option>
                            <option value="squat">Squats</option>
                        </select>
                    </div>
                </div>

                <!-- Live Statistics -->
                <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800 shadow-xl grid grid-cols-2 gap-4">
                    <div class="col-span-2 mb-2 bg-slate-950 p-4 rounded-xl border border-slate-800">
                        <p class="text-xs font-medium uppercase tracking-wider text-slate-500 mb-1">Live AI Feedback</p>
                        <p id="feedbackText" class="text-xl font-bold text-slate-300 leading-tight">Waiting to start...</p>
                    </div>
                    
                    <div class="bg-slate-950 p-5 rounded-xl border border-slate-800 flex flex-col items-center justify-center relative overflow-hidden group">
                        <div class="absolute inset-0 bg-green-500/10 opacity-0 transition-opacity duration-300" id="repGlow"></div>
                        <p class="text-xs font-medium uppercase tracking-wider text-slate-500 mb-1 z-10">Total Reps</p>
                        <p id="repsCount" class="text-5xl font-extrabold text-white z-10 transition-transform duration-300">0</p>
                        <p id="stageText" class="text-[10px] font-bold uppercase tracking-widest text-slate-600 mt-2 z-10">Stage: --</p>
                    </div>
                    
                    <div class="bg-slate-950 p-5 rounded-xl border border-slate-800 flex flex-col items-center justify-center">
                        <p class="text-xs font-medium uppercase tracking-wider text-slate-500 mb-1">Target Angle</p>
                        <p id="angleDisplay" class="text-4xl font-bold text-blue-400">--°</p>
                    </div>
                    
                    <div class="col-span-2 mt-2">
                         <button id="resetBtn" class="w-full bg-slate-800 hover:bg-slate-700 text-slate-300 p-2.5 rounded-xl font-medium transition-all text-sm border border-slate-700 hover:border-slate-600">
                             Reset Progress
                         </button>
                    </div>
                </div>
                
                <!-- Dynamic Instructions -->
                <div class="bg-blue-900/10 p-5 rounded-xl border border-blue-900/30">
                    <h3 class="text-sm font-semibold text-blue-400 mb-3 flex items-center">
                        <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        Instructions
                    </h3>
                    <ul id="instructionsList" class="text-sm text-slate-400 space-y-2 list-disc pl-4 marker:text-blue-700">
                        <!-- Filled dynamically via JS -->
                    </ul>
                </div>
                
            </div>
        </div>
    </div>

    <script>
        // --- State Variables ---
        let detector;
        let cameraActive = false;
        let stream;
        let currentExercise = 'bicepCurl';
        let reps = 0;
        let stage = 'down'; // 'down' or 'up'
        let angleHistory = []; // For smoothing

        // --- DOM Elements ---
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const cameraBtn = document.getElementById('cameraBtn');
        const exerciseSelect = document.getElementById('exerciseSelect');
        const resetBtn = document.getElementById('resetBtn');
        const feedbackText = document.getElementById('feedbackText');
        const repsCount = document.getElementById('repsCount');
        const angleDisplay = document.getElementById('angleDisplay');
        const stageText = document.getElementById('stageText');
        const instructionsList = document.getElementById('instructionsList');
        const cameraPrompt = document.getElementById('cameraPrompt');

        // --- Exercise Instructions ---
        const instructions = {
            bicepCurl: [
                "Stand facing or slightly sideways to the camera.",
                "Ensure your torso and arms are clearly visible.",
                "Keep your back straight and shoulders level.",
                "Extend arms fully downwards to start."
            ],
            squat: [
                "Stand sideways so the camera sees your profile.",
                "Ensure your entire body (shoulders to ankles) is visible.",
                "Keep your back straight while going down.",
                "Squat until your knees are at ~90 degrees."
            ]
        };

        // Standard 17 keypoints map for drawing skeleton connections
        const SKELETON_PAIRS = [
            [0, 1], [0, 2], [1, 3], [2, 4], // Head
            [5, 6], [5, 7], [7, 9], [6, 8], [8, 10], // Arms/Shoulders
            [5, 11], [6, 12], [11, 12], // Torso
            [11, 13], [13, 15], [12, 14], [14, 16] // Legs
        ];

        // --- Initialization ---
        document.addEventListener('DOMContentLoaded', async () => {
            updateInstructions();
            
            try {
                // Wait for TFJS backend to be ready
                await tf.ready();
                // Load the MoveNet model (Lightning version is faster for real-time webcam)
                detector = await poseDetection.createDetector(poseDetection.SupportedModels.MoveNet, {
                    modelType: poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING
                });
                
                // Remove loading overlay and enable controls
                loadingOverlay.style.opacity = '0';
                setTimeout(() => loadingOverlay.classList.add('hidden'), 500);
                
                cameraBtn.disabled = false;
                cameraBtn.textContent = "Start Camera";
                updateAdviceUI("Ready. Start the camera.", "text-blue-400");
                
            } catch (error) {
                console.error("Error loading model:", error);
                loadingOverlay.innerHTML = `
                    <p class="text-red-500 font-bold text-xl mb-2">Error Loading AI Model</p>
                    <p class="text-slate-400 text-sm">Please refresh the page and try again.</p>
                `;
            }
        });

        // --- Event Listeners ---
        cameraBtn.addEventListener('click', async () => {
            if (cameraActive) {
                stopCamera();
            } else {
                await startCamera();
            }
        });

        exerciseSelect.addEventListener('change', (e) => {
            currentExercise = e.target.value;
            updateInstructions();
            resetProgress();
        });

        resetBtn.addEventListener('click', resetProgress);

        // --- Camera Handling ---
        async function startCamera() {
            try {
                // Request camera access
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: 640, height: 480, facingMode: "user" } 
                });
                video.srcObject = stream;
                
                video.onloadedmetadata = () => {
                    video.play();
                    // Match canvas dimensions exactly to video internal resolution
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    
                    cameraActive = true;
                    cameraPrompt.classList.add('hidden');
                    
                    // Update Button UI
                    cameraBtn.innerHTML = `
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 10a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z"></path></svg>
                        Stop Camera
                    `;
                    cameraBtn.classList.replace('bg-blue-600', 'bg-red-600');
                    cameraBtn.classList.replace('hover:bg-blue-500', 'hover:bg-red-500');
                    cameraBtn.classList.replace('shadow-blue-600/20', 'shadow-red-600/20');
                    
                    updateAdviceUI("Stand in frame to begin...", "text-blue-400");
                    
                    // Start detection loop
                    detectPose(); 
                };
            } catch (err) {
                console.error("Error accessing camera:", err);
                updateAdviceUI("Camera access denied.", "text-red-500");
            }
        }

        function stopCamera() {
            cameraActive = false;
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            video.srcObject = null;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            cameraPrompt.classList.remove('hidden');
            
            // Revert Button UI
            cameraBtn.innerHTML = `Start Camera`;
            cameraBtn.classList.replace('bg-red-600', 'bg-blue-600');
            cameraBtn.classList.replace('hover:bg-red-500', 'hover:bg-blue-500');
            cameraBtn.classList.replace('shadow-red-600/20', 'shadow-blue-600/20');
            
            updateAdviceUI("Camera Stopped", "text-slate-500");
            updateAngleUI(0);
        }

        // --- Core Detection Loop ---
        async function detectPose() {
            if (!cameraActive) return;

            try {
                // Estimate pose
                const poses = await detector.estimatePoses(video, {
                    maxPoses: 1,
                    flipHorizontal: false // Canvas CSS already mirrors it visually
                });

                ctx.clearRect(0, 0, canvas.width, canvas.height);

                if (poses.length > 0) {
                    const keypoints = poses[0].keypoints;
                    drawPoses(keypoints);
                    
                    if (currentExercise === 'bicepCurl') {
                        analyzeBicepCurl(keypoints);
                    } else if (currentExercise === 'squat') {
                        analyzeSquat(keypoints);
                    }
                } else {
                     updateAdviceUI("No person detected.", "text-yellow-500");
                }
            } catch (e) {
                console.error("Pose detection error:", e);
            }

            // Loop
            if (cameraActive) {
                window.requestAnimationFrame(detectPose);
            }
        }

        // --- Biomechanical Analysis Logic ---

        // Helper: Calculate angle between three points (A, B, C) where B is the vertex
        function calculateAngle(a, b, c) {
            const radians = Math.atan2(c.y - b.y, c.x - b.x) - Math.atan2(a.y - b.y, a.x - b.x);
            let angle = Math.abs((radians * 180.0) / Math.PI);
            if (angle > 180.0) {
                angle = 360.0 - angle;
            }
            return angle;
        }

        // Helper: Moving average to smooth jittery camera coordinates
        function getSmoothedAngle(newAngle) {
            angleHistory.push(newAngle);
            if (angleHistory.length > 5) angleHistory.shift();
            return angleHistory.reduce((a, b) => a + b, 0) / angleHistory.length;
        }

        // Helper: Determine if the user is facing left or right relative to the camera
        function getVisibleSide(keypoints, joints) {
            let leftScore = 0;
            let rightScore = 0;
            joints.forEach(joint => {
                const leftKp = keypoints.find(k => k.name === `left_${joint}`);
                const rightKp = keypoints.find(k => k.name === `right_${joint}`);
                if (leftKp) leftScore += leftKp.score;
                if (rightKp) rightScore += rightKp.score;
            });
            return leftScore > rightScore ? 'left' : 'right';
        }

        function analyzeBicepCurl(keypoints) {
            const side = getVisibleSide(keypoints, ['shoulder', 'elbow', 'wrist']);
            const shoulder = keypoints.find(k => k.name === `${side}_shoulder`);
            const elbow = keypoints.find(k => k.name === `${side}_elbow`);
            const wrist = keypoints.find(k => k.name === `${side}_wrist`);

            // Check if arm is visible with high confidence
            if (shoulder && elbow && wrist && shoulder.score > 0.4 && elbow.score > 0.4 && wrist.score > 0.4) {
                const rawAngle = calculateAngle(shoulder, elbow, wrist);
                const angle = getSmoothedAngle(rawAngle);
                
                updateAngleUI(angle);
                drawAngleLabel(elbow, angle);

                // Rep counting logic
                if (angle > 150) {
                    if (stage !== 'down') updateStageUI('down');
                }
                if (angle < 45 && stage === 'down') {
                    updateStageUI('up');
                    reps++;
                    triggerRepAnimation();
                }

                // Posture advice logic (check shoulder levels)
                const otherShoulder = keypoints.find(k => k.name === (side === 'left' ? 'right_shoulder' : 'left_shoulder'));
                if (otherShoulder && otherShoulder.score > 0.4) {
                    const shoulderDiff = Math.abs(shoulder.y - otherShoulder.y);
                    if (shoulderDiff > 40) { // Shoulders are uneven
                        updateAdviceUI("Keep shoulders level!", "text-red-400");
                        highlightJoint(shoulder);
                        highlightJoint(otherShoulder);
                    } else {
                        updateAdviceUI("Good form. Keep going!", "text-green-400");
                    }
                } else {
                     updateAdviceUI("Tracking...", "text-blue-400");
                }
            } else {
                updateAdviceUI("Ensure full arm is visible", "text-yellow-400");
            }
        }

        function analyzeSquat(keypoints) {
            const side = getVisibleSide(keypoints, ['hip', 'knee', 'ankle']);
            const hip = keypoints.find(k => k.name === `${side}_hip`);
            const knee = keypoints.find(k => k.name === `${side}_knee`);
            const ankle = keypoints.find(k => k.name === `${side}_ankle`);

            // Check if leg is visible
            if (hip && knee && ankle && hip.score > 0.4 && knee.score > 0.4 && ankle.score > 0.4) {
                const rawAngle = calculateAngle(hip, knee, ankle);
                const angle = getSmoothedAngle(rawAngle);
                
                updateAngleUI(angle);
                drawAngleLabel(knee, angle);

                // Rep counting logic
                if (angle > 160) {
                    if (stage !== 'up') updateStageUI('up');
                }
                if (angle < 95 && stage === 'up') {
                    updateStageUI('down');
                    reps++;
                    triggerRepAnimation();
                }

                // Posture advice logic (check back angle relative to vertical)
                const shoulder = keypoints.find(k => k.name === `${side}_shoulder`);
                if (shoulder && shoulder.score > 0.4) {
                    const vertical = { x: hip.x, y: hip.y - 100 }; // Point directly above hip
                    const backAngle = calculateAngle(shoulder, hip, vertical);
                    
                    if (backAngle > 45) { // Back is leaning too far forward
                        updateAdviceUI("Straighten your back!", "text-red-400");
                        highlightJoint(shoulder);
                        highlightJoint(hip);
                    } else {
                        updateAdviceUI("Great squat form!", "text-green-400");
                    }
                } else {
                    updateAdviceUI("Tracking...", "text-blue-400");
                }
            } else {
                updateAdviceUI("Ensure full body is visible", "text-yellow-400");
            }
        }

        // --- Canvas Drawing Utilities ---

        function drawPoses(keypoints) {
            // 1. Draw skeleton connections
            ctx.strokeStyle = '#3b82f6'; // Tailwind blue-500
            ctx.lineWidth = 3;
            
            SKELETON_PAIRS.forEach(pair => {
                const kp1 = keypoints[pair[0]];
                const kp2 = keypoints[pair[1]];
                
                if (kp1 && kp2 && kp1.score > 0.3 && kp2.score > 0.3) {
                    ctx.beginPath();
                    ctx.moveTo(kp1.x, kp1.y);
                    ctx.lineTo(kp2.x, kp2.y);
                    ctx.stroke();
                }
            });

            // 2. Draw keypoint dots
            keypoints.forEach(keypoint => {
                if (keypoint.score > 0.3) {
                    ctx.beginPath();
                    ctx.arc(keypoint.x, keypoint.y, 5, 0, 2 * Math.PI);
                    ctx.fillStyle = '#10b981'; // Tailwind green-500
                    ctx.fill();
                }
            });
        }

        function drawAngleLabel(joint, angle) {
            // Draw a subtle background pill
            ctx.fillStyle = "rgba(15, 23, 42, 0.7)"; // slate-900 with opacity
            ctx.beginPath();
            ctx.roundRect(joint.x + 10, joint.y - 30, 50, 28, 6);
            ctx.fill();
            
            // Draw angle text
            ctx.font = "bold 16px Arial";
            ctx.fillStyle = "#4ade80"; // Tailwind green-400
            ctx.fillText(Math.round(angle) + "°", joint.x + 18, joint.y - 10);
        }

        function highlightJoint(joint) {
            ctx.beginPath();
            ctx.arc(joint.x, joint.y, 12, 0, 2 * Math.PI);
            ctx.fillStyle = "rgba(239, 68, 68, 0.5)"; // Red-500 with opacity
            ctx.fill();
            ctx.strokeStyle = "#ef4444";
            ctx.lineWidth = 3;
            ctx.stroke();
        }

        // --- UI Updaters ---

        function updateAdviceUI(text, colorClass = "text-slate-300") {
            feedbackText.textContent = text;
            feedbackText.className = `text-xl font-bold transition-colors duration-300 ${colorClass} leading-tight`;
        }

        function updateAngleUI(angle) {
            angleDisplay.textContent = angle === 0 ? "--°" : Math.round(angle) + "°";
        }

        function triggerRepAnimation() {
            repsCount.textContent = reps;
            const repGlow = document.getElementById('repGlow');
            
            // Pop effect
            repsCount.style.transform = "scale(1.2)";
            repsCount.style.color = "#4ade80";
            repGlow.style.opacity = "1";
            
            setTimeout(() => {
                repsCount.style.transform = "scale(1)";
                repsCount.style.color = "white";
                repGlow.style.opacity = "0";
            }, 300);
        }

        function updateStageUI(newStage) {
            stage = newStage;
            stageText.textContent = `Stage: ${stage}`;
            // Highlight text briefly to indicate change
            stageText.classList.add('text-blue-400');
            setTimeout(() => stageText.classList.remove('text-blue-400'), 200);
        }

        function updateInstructions() {
            instructionsList.innerHTML = instructions[currentExercise].map(inst => `<li>${inst}</li>`).join('');
        }

        function resetProgress() {
            reps = 0;
            stage = 'down';
            repsCount.textContent = reps;
            updateAngleUI(0);
            updateStageUI('down');
            angleHistory = [];
            if(cameraActive) {
                updateAdviceUI("Progress reset. Stand in frame.", "text-blue-400");
            }
        }
    </script>
</body>
</html>
